name: freshness-prune

# Component C — delete listings a healthy board no longer serves (filled/closed
# jobs that silently dropped out of the ATS feed). Chained to run AFTER the nightly
# DEEP refresh so last_polled_at reflects the most thorough recent sweep. Uses
# successful polls as ground truth — no per-URL HTTP checks. See jobbot/prune.py.
on:
  workflow_run:
    workflows: ["freshness-deep"]
    types: [completed]
  workflow_dispatch: {}

concurrency:
  group: freshness-prune
  cancel-in-progress: false

jobs:
  prune:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Only after a SUCCESSFUL deep run (a failed/cancelled deep leaves last_polled_at
    # unreliable). Manual dispatch always runs.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Run prune
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python -m scripts.run_prune
      - name: Audit log (heartbeat)
        if: ${{ always() }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          curl -s -X POST "$SUPABASE_URL/rest/v1/audit_log" \
            -H "apikey: $SUPABASE_SERVICE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_KEY" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d "{\"note\":\"${GITHUB_WORKFLOW} run ${GITHUB_RUN_ID} finished with status ${{ job.status }}\"}" || true
