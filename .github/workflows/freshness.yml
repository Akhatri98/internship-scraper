name: freshness

# Component B — poll every company's ATS public JSON, filter, upsert listings.
on:
  schedule:
    - cron: "0 9 * * *"   # 09:00 UTC
    - cron: "0 21 * * *"  # 21:00 UTC (~12h apart so the 2nd run finds new posts)
  workflow_dispatch: {}

concurrency:
  group: freshness
  cancel-in-progress: false   # let an in-flight run finish rather than double-work

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Run refresh
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python -m scripts.run_refresh --workers 60
      - name: Audit log (heartbeat)
        if: ${{ always() }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          curl -s -X POST "$SUPABASE_URL/rest/v1/audit_log" \
            -H "apikey: $SUPABASE_SERVICE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_KEY" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d "{\"note\":\"${GITHUB_WORKFLOW} run ${GITHUB_RUN_ID} finished with status ${{ job.status }}\"}" || true
      - name: Notify on failure
        if: ${{ failure() }}
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then echo "no webhook configured"; exit 0; fi
          curl -s -H "Content-Type: application/json" \
            -d "{\"content\":\":x: Job-Bot ${GITHUB_WORKFLOW} failed — ${GITHUB_REPOSITORY} run ${GITHUB_RUN_ID}\"}" \
            "$DISCORD_WEBHOOK_URL" || true
