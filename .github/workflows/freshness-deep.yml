name: freshness-deep

# Component B, DEEP profile — nightly thorough sweep. Patient retries + high trip
# threshold + incremental flushing, with hours of leeway, to squeeze out the
# flaky/blocked hosts the 2x/day FAST runs skip.
on:
  schedule:
    - cron: "0 7 * * *"   # 07:00 UTC nightly (~02:00-03:00 US Eastern)
  workflow_dispatch: {}

concurrency:
  group: freshness-deep
  cancel-in-progress: false

jobs:
  refresh-deep:
    runs-on: ubuntu-latest
    timeout-minutes: 210   # ~3.5h: 3h of leeway + margin
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Run deep refresh
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python -m scripts.run_refresh --deep
      - name: Audit log (heartbeat)
        if: ${{ always() }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          curl -s -X POST "$SUPABASE_URL/rest/v1/audit_log" \
            -H "apikey: $SUPABASE_SERVICE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_KEY" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d "{\"note\":\"${GITHUB_WORKFLOW} run ${GITHUB_RUN_ID} finished with status ${{ job.status }}\"}" || true
      - name: Notify on failure
        if: ${{ failure() }}
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then echo "no webhook configured"; exit 0; fi
          curl -s -H "Content-Type: application/json" \
            -d "{\"content\":\":x: Job-Bot ${GITHUB_WORKFLOW} failed — ${GITHUB_REPOSITORY} run ${GITHUB_RUN_ID}\"}" \
            "$DISCORD_WEBHOOK_URL" || true
